[general]
live_config_reload = true

[window]
padding = { x = 8, y = 6 }
dynamic_padding = true
opacity = 0.96
startup_mode = "Windowed"

[scrolling]
history = 20000
multiplier = 5

[font]
size = 12.0
builtin_box_drawing = true

[font.normal]
family = "Maple Mono NF CN"

# Everforest dark medium, aligned with the current Neovim theme.
[colors.primary]
background = "#2d353b"
foreground = "#d3c6aa"

[colors.normal]
black = "#475258"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

[colors.bright]
black = "#475258"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

[colors.cursor]
text = "CellBackground"
cursor = "CellForeground"

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "Off" }
unfocused_hollow = true

[terminal]
osc52 = "OnlyCopy"

[mouse]
hide_when_typing = true